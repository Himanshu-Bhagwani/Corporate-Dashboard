services:
  db:
    image: postgres:15
    restart: always
    command: -p 5433
    environment:
      POSTGRES_DB: dashboard_db
      POSTGRES_USER: dashboard_user
      POSTGRES_PASSWORD: dashboard123
    ports:
      - "5434:5433"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dashboard_user -d dashboard_db -p 5433"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: always
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - "5001:5000"
    environment:
      DB_USER: dashboard_user
      DB_HOST: db
      DB_NAME: dashboard_db
      DB_PASSWORD: dashboard123
      DB_PORT: 5433
      PORT: 5000
      OLLAMA_URL: http://ollama:11434/api/generate
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend

  ollama:
    image: ollama/ollama:latest
    container_name: soda_ollama
    restart: always
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  ollama-pull:
    image: curlimages/curl:latest
    container_name: soda_ollama_pull
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for Ollama API..."
        while ! curl -s http://ollama:11434/api/tags >/dev/null; do sleep 2; done
        echo "Pulling llama3.2:1b model..."
        curl -X POST http://ollama:11434/api/pull -d '{"name": "llama3.2:1b"}'
        echo "Model ready!"
    depends_on:
      - ollama

volumes:
  pg_data:
  ollama_data:
