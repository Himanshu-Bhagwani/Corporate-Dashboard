services:
  db:
    image: postgres:15
    restart: always
    command: -p 5433
    environment:
      POSTGRES_DB: dashboard_db
      POSTGRES_USER: dashboard_user
      POSTGRES_PASSWORD: dashboard123
    ports:
      - "5433:5433"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dashboard_user -d dashboard_db -p 5433"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      DB_USER: dashboard_user
      DB_HOST: db
      DB_NAME: dashboard_db
      DB_PASSWORD: dashboard123
      DB_PORT: 5433
      PORT: 5000
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: always
    ports:
      - "3001:80"
    depends_on:
      - backend

volumes:
  postgres_data:
